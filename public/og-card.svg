<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E1E1E"/>

  <!-- Subtle grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="600" height="630" fill="url(#orangeGlow)"/>

  <!-- Top-left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#FF6600"/>

  <!-- Logo box -->
  <rect x="80" y="200" width="90" height="90" rx="18" fill="#FF6600"/>
  <text
    x="125" y="268"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="64"
    font-weight="700"
    text-anchor="middle"
    fill="#FFFFFF"
  >L</text>

  <!-- Brand name -->
  <text
    x="192" y="256"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="52"
    font-weight="600"
    fill="#FFFFFF"
  >lokalhost<tspan fill="#FF6600">.club</tspan></text>

  <!-- Tagline -->
  <text
    x="80" y="340"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#D4D4D4"
    opacity="0.85"
  >The dev community built for builders. 🇵🇭</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="80" y="390" width="160" height="38" rx="19" fill="#FF6600" opacity="0.15"/>
  <rect x="80" y="390" width="160" height="38" rx="19" fill="none" stroke="#FF6600" stroke-width="1.2" opacity="0.6"/>
  <text x="160" y="414" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle" fill="#FF6600">🔥 Roast Code</text>

  <!-- Pill 2 -->
  <rect x="256" y="390" width="180" height="38" rx="19" fill="#FF6600" opacity="0.15"/>
  <rect x="256" y="390" width="180" height="38" rx="19" fill="none" stroke="#FF6600" stroke-width="1.2" opacity="0.6"/>
  <text x="346" y="414" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle" fill="#FF6600">🚀 Ship Projects</text>

  <!-- Pill 3 -->
  <rect x="452" y="390" width="160" height="38" rx="19" fill="#FF6600" opacity="0.15"/>
  <rect x="452" y="390" width="160" height="38" rx="19" fill="none" stroke="#FF6600" stroke-width="1.2" opacity="0.6"/>
  <text x="532" y="414" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="15" font-weight="500" text-anchor="middle" fill="#FF6600">🏆 Earn Rank</text>

  <!-- URL at bottom -->
  <text
    x="80" y="580"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    fill="#FF6600"
    opacity="0.7"
  >app.lokalhost.club</text>

  <!-- Decorative right-side terminal block -->
  <rect x="760" y="180" width="360" height="240" rx="10" fill="#2A2A2A"/>
  <rect x="760" y="180" width="360" height="32" rx="10" fill="#333333"/>
  <!-- Terminal dots -->
  <circle cx="790" cy="196" r="6" fill="#FF5F57"/>
  <circle cx="810" cy="196" r="6" fill="#FEBC2E"/>
  <circle cx="830" cy="196" r="6" fill="#28C840"/>
  <!-- Terminal text lines -->
  <text x="780" y="240" font-family="'Courier New', Courier, monospace" font-size="14" fill="#FF6600">$ lokalhost --init community</text>
  <text x="780" y="265" font-family="'Courier New', Courier, monospace" font-size="14" fill="#D4D4D4" opacity="0.7">✓ Feed ranked by algorithm</text>
  <text x="780" y="290" font-family="'Courier New', Courier, monospace" font-size="14" fill="#D4D4D4" opacity="0.7">✓ Roast your code. Ship faster.</text>
  <text x="780" y="315" font-family="'Courier New', Courier, monospace" font-size="14" fill="#D4D4D4" opacity="0.7">✓ Earn XP. Climb the ranks.</text>
  <text x="780" y="345" font-family="'Courier New', Courier, monospace" font-size="14" fill="#28C840">▊</text>
</svg>
