name: Deploy → Production

# Triggers ONLY on push/merge to `main`
on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Build & type-check the frontend
  # ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production mode)
        run: npm run build:production
        env:
          VITE_APP_ENV: production
          VITE_SUPABASE_URL: https://cdglgwuquklscfwivfcj.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_GRAPHQL_URL: ${{ secrets.PROD_GRAPHQL_URL }}
          VITE_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          VITE_GETSTREAM_API_KEY: ${{ secrets.GETSTREAM_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-production-dist
          path: dist/

  # ─────────────────────────────────────────────────────────
  # Job 2: Type-check & build the backend
  # ─────────────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

  # ─────────────────────────────────────────────────────────
  # Job 3: Deploy backend to Railway production
  # Requires a manual "approve" gate in GitHub Environments
  # ─────────────────────────────────────────────────────────
  deploy-backend-production:
    name: Deploy Backend → Railway Production
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    environment: production        # ← requires approval in GitHub Settings → Environments
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway production
        run: railway up --service ${{ secrets.RAILWAY_PROD_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD_TOKEN }}
