name: Deploy → Staging

# Triggers on every push/merge to the `staging` branch
on:
  push:
    branches:
      - staging

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Build & type-check the frontend
  # ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build (staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging mode)
        run: npm run build:staging
        env:
          VITE_APP_ENV: staging
          VITE_SUPABASE_URL: https://ihljxjtbdcgisvbbrqll.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_GRAPHQL_URL: ${{ secrets.STAGING_GRAPHQL_URL }}
          VITE_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          VITE_GETSTREAM_API_KEY: ${{ secrets.GETSTREAM_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-staging-dist
          path: dist/

  # ─────────────────────────────────────────────────────────
  # Job 2: Type-check & build the backend
  # ─────────────────────────────────────────────────────────
  backend-build:
    name: Backend — Build & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

  # ─────────────────────────────────────────────────────────
  # Job 3: Deploy backend to Railway staging
  # Runs after both build jobs pass
  # ─────────────────────────────────────────────────────────
  deploy-backend-staging:
    name: Deploy Backend → Railway Staging
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway staging
        run: railway up --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
